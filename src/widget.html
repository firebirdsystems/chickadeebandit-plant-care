<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Care Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 8px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
    }
    .header-title { font-weight: 600; font-size: 13px; }
    .header-count { font-size: 11px; color: #6b7280; }

    .plant-list { flex: 1; overflow-y: auto; }

    .plant-section { border-bottom: 1px solid #f3f4f6; }
    .plant-section:last-child { border-bottom: none; }

    .plant-header {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px 3px;
    }
    .plant-emoji { font-size: 16px; flex-shrink: 0; }
    .plant-name  { flex: 1; font-size: 12.5px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plant-type  { font-size: 11px; color: #9ca3af; flex-shrink: 0; }

    .activity-row {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 14px 3px 38px;
    }
    .act-icon  { font-size: 13px; flex-shrink: 0; }
    .act-name  { flex: 1; font-size: 11.5px; color: #374151; }

    .due-badge {
      font-size: 10px; font-weight: 600; border-radius: 10px;
      padding: 1px 6px; flex-shrink: 0;
    }
    .due-overdue { background: #fee2e2; color: #dc2626; }
    .due-soon    { background: #fef3c7; color: #d97706; }
    .due-ok      { background: #d1fae5; color: #059669; }

    .footer {
      padding: 6px 14px; border-top: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: #f9fafb;
    }
    .footer-hint { font-size: 11px; color: #9ca3af; }
    .open-link { font-size: 11px; font-weight: 600; color: #111827; text-decoration: none; }
    .open-link:hover { text-decoration: underline; }

    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #9ca3af; font-size: 12px; gap: 6px;
    }
  </style>
</head>
<body>
<script type="module">
const DB     = window.__DB_URL ?? "";
const APP_ID = "plant-care";

function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

async function dbq(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

async function load() {
  const [{ rows: plants }, { rows: activities }, { rows: lastLogs }] = await Promise.all([
    dbq(`SELECT id, name, type, emoji FROM plants ORDER BY name ASC`),
    dbq(`SELECT id, plant_id, name, icon, interval_days FROM activities ORDER BY sort_order, created_at`),
    dbq(`SELECT activity_id, MAX(done_at) AS last_done FROM logs GROUP BY activity_id`),
  ]);

  const lastMap = Object.fromEntries(lastLogs.map(r => [r.activity_id, r.last_done]));
  const now = Date.now();

  function dueHours(act) {
    const intervalMs = act.interval_days * 86400000;
    const lastDone = lastMap[act.id];
    if (lastDone) {
      const next = new Date(lastDone).getTime() + intervalMs;
      return (next - now) / 3600000;
    }
    return -(act.interval_days * 24); // never done
  }

  function dueLabel(hours) {
    if (hours <= 0) {
      const h = Math.round(-hours);
      return h < 24 ? (h < 1 ? "Now" : `${h}h overdue`) : `${Math.round(h/24)}d overdue`;
    }
    if (hours < 24) return `${Math.round(hours)}h`;
    return `${Math.round(hours/24)}d`;
  }

  function dueCls(hours) {
    if (hours <= 0) return "due-overdue";
    if (hours <= 24) return "due-soon";
    return "due-ok";
  }

  let overdueCount = 0;

  const sections = plants.map(plant => {
    const plantActs = activities.filter(a => a.plant_id === plant.id);
    if (plantActs.length === 0) return null;

    const rows = plantActs.map(act => {
      const hours = dueHours(act);
      if (hours <= 0) overdueCount++;
      const cls   = dueCls(hours);
      const label = dueLabel(hours);
      return `<div class="activity-row">
        <span class="act-icon">${act.icon ?? "💧"}</span>
        <span class="act-name">${esc(act.name)}</span>
        <span class="due-badge ${cls}">${label}</span>
      </div>`;
    }).join("");

    return `<div class="plant-section">
      <div class="plant-header">
        <span class="plant-emoji">${plant.emoji ?? "🪴"}</span>
        <span class="plant-name">${esc(plant.name)}</span>
        ${plant.type ? `<span class="plant-type">${esc(plant.type)}</span>` : ""}
      </div>
      ${rows}
    </div>`;
  }).filter(Boolean);

  const header = `
    <div class="header">
      <span class="header-title">Plant Care</span>
      <span class="header-count">${overdueCount > 0 ? `${overdueCount} overdue` : `${plants.length} plant${plants.length !== 1 ? "s" : ""}`}</span>
    </div>`;

  let body;
  if (plants.length === 0) {
    body = `<div class="empty">
      <span>No plants added yet</span>
      <a href="/open/${APP_ID}" onclick="window.__HUB_OPEN && (event.preventDefault(), window.__HUB_OPEN('${APP_ID}'))" style="color:#111827;font-weight:600;font-size:11px">Add a plant →</a>
    </div>`;
  } else if (sections.length === 0) {
    body = `<div class="empty"><span>No care tasks set up yet</span></div>`;
  } else {
    body = `<div class="plant-list">${sections.join("")}</div>`;
  }

  const footer = `
    <div class="footer">
      <span class="footer-hint">${plants.length} plant${plants.length !== 1 ? "s" : ""}, ${activities.length} task${activities.length !== 1 ? "s" : ""}</span>
      <a class="open-link" href="/open/${APP_ID}" onclick="window.__HUB_OPEN && (event.preventDefault(), window.__HUB_OPEN('${APP_ID}'))">Open Plant Care →</a>
    </div>`;

  document.body.innerHTML = header + body + footer;
}

load().catch(() => {
  document.body.innerHTML = `<div class="empty"><a href="/open/${APP_ID}" style="color:#111827;font-weight:600">Open Plant Care →</a></div>`;
});
</script>
</body>
</html>
